            "S6.3"
        ],
        "summary": "El Consejo aprobó una función de auditoría interna sin definir acceso, autoridad ni responsabilidades, generando restricciones operativas al DEA.",
        "sector": "Gobierno corporativo",
        "difficulty": "Intermedio",
        "profile": [
            "dea",
            "comite"
        ],
        "tags": [
            "mandato",
            "consejo",
            "autoridad",
            "estatuto"

            "KC0002",

            "KC0005"

        "content": {
            "context": "Una organización formaliza la función de auditoría interna, pero el documento aprobado solo menciona que existirá auditoría interna. No establece propósito, autoridad, dependencia funcional, acceso a información ni obligaciones del Consejo.",
            "problem": "El DEA no puede acceder oportunamente a información crítica ni elevar limitaciones al Consejo porque la autoridad de la función no quedó documentada con precisión.",
            "analysis": [
                "La ausencia de autoridad explícita debilita la independencia práctica de la función.",
                "El Estatuto no puede compensar por completo un mandato institucional ambiguo.",
                "El Consejo carece de criterios claros para supervisar apoyo, recursos y desempeño."
            ],
            "solution": [
                "Reformular el mandato con aprobación del Consejo.",
                "Definir propósito, autoridad, responsabilidad, acceso irrestricto y línea funcional de reporte.",
                "Actualizar el Estatuto para reflejar el mandato aprobado.",
                "Comunicar formalmente la autoridad de Auditoría Interna a la Alta Dirección."
            ],
            "lessons": [
                "El mandato es una decisión de gobierno, no un trámite documental.",
                "Sin mandato claro, la independencia puede existir formalmente pero fallar operativamente.",
                "El Consejo debe supervisar que la autoridad conferida se ejerza en la práctica."
            ],
            "questions": [
                "¿Qué elementos mínimos debe contener el mandato?",
                "¿Qué diferencia práctica existe entre mandato y estatuto?",
                "¿Qué evidencia demostraría la autorización efectiva del Consejo?"
            ]
        }
    },

            "lessons": [

function bindKnowledgeViewer(root,{router,itemId}){
  root.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>router.go('/item/'+b.dataset.id));
  root.querySelectorAll('[data-tab]').forEach(btn=>btn.onclick=()=>{
    const tab=btn.dataset.tab;
    root.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x===btn));
    root.querySelectorAll('[data-panel]').forEach(p=>p.classList.toggle('active',p.dataset.panel===tab));
  });
  root.querySelectorAll('[data-action="print"]').forEach(b=>b.onclick=()=>window.print());
  root.querySelectorAll('[data-action="copy-link"]').forEach(b=>b.onclick=()=>{try{navigator.clipboard.writeText(itemId);b.textContent='ID copiado';setTimeout(()=>b.textContent='Copiar ID',1400);}catch(_){b.textContent=itemId;}});
  try{
    const state=JSON.parse(localStorage.getItem('auditoria_nogai_checks_v1'))||{};
    root.querySelectorAll('[data-check]').forEach(ch=>{ch.checked=!!state[ch.dataset.check];ch.onchange=()=>{state[ch.dataset.check]=ch.checked;localStorage.setItem('auditoria_nogai_checks_v1',JSON.stringify(state));};});
  }catch(_){}
}

function bindSearchView(root,{router,onSearch}){
  root.querySelectorAll('.result-card').forEach(btn=>btn.onclick=()=>router.go('/item/'+btn.dataset.id));

  const run=()=>onSearch(input.value||'');

const STORAGE_KEY='auditoria_nogai_implementation_v1';
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(_){return{};}}

function cardProgress(id){const state=loadState();const completed=state[id]||[];return Math.round((completed.length/DEFAULT_STEPS.length)*100);}
function setStep(cardId,stepId,checked){const state=loadState();const current=new Set(state[cardId]||[]);checked?current.add(stepId):current.delete(stepId);state[cardId]=[...current];state.updatedAt=new Date().toISOString();saveState(state);}
function routeForCard(cardId){return ROUTE_SETS.find(r=>r.cards.includes(cardId))||ROUTE_SETS[0];}
function progressBar(value){return `<div class="imp-progress" aria-label="Avance ${value}%"><span style="width:${Math.max(0,Math.min(100,value))}%"></span></div>`;}
function routeTabs(active){return `<div class="imp-tabs" role="tablist">${ROUTE_SETS.map(r=>`<button class="${r.id===active?'active':''}" data-route-set="${impEsc(r.id)}">${impEsc(r.title)}</button>`).join('')}</div>`;}

function standardsBlock(item,store){const standards=impArr(item.standards).map(id=>store.get(id)).filter(Boolean);return standards.length?`<div class="imp-standards">${standards.map(s=>`<button data-open="${impEsc(s.id)}"><strong>${impEsc(s.id)}</strong><span>${impEsc(s.title)}</span></button>`).join('')}</div>`:'<p class="empty">Sin normas vinculadas.</p>';}

function checklistBlock(item){const c=item.content||{};const objectives=impArr(c.objectives);const errors=impArr(c.commonErrors);const good=impArr(c.goodPractices);return `<div class="imp-checklist"><section><h4>Objetivos de control</h4>${objectives.length?objectives.map(x=>`<label><input type="checkbox"> ${impEsc(x)}</label>`).join(''):'<p class="empty">Pendiente de ampliación.</p>'}</section><section><h4>Buenas prácticas</h4>${good.length?good.map(x=>`<label><input type="checkbox"> ${impEsc(x)}</label>`).join(''):'<p class="empty">Pendiente de ampliación.</p>'}</section><section><h4>Errores a evitar</h4>${errors.length?errors.map(x=>`<label><input type="checkbox"> ${impEsc(x)}</label>`).join(''):'<p class="empty">Pendiente de ampliación.</p>'}</section></div>`;}

function bindEvaluations(root,{store,knowledge,router}){

  function apply(){const term=(search.value||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); list.querySelectorAll('.eval-question').forEach(card=>{const text=card.textContent.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); const domainOk=domain==='all'||card.dataset.domain===domain; const diffOk=difficulty==='all'||card.dataset.difficulty===difficulty; card.style.display=(domainOk&&diffOk&&text.includes(term))?'':'none';});}
  list.querySelectorAll('[data-q]').forEach(btn=>btn.onclick=()=>{answers.set(btn.dataset.q,btn.dataset.option); save(); paint(btn.dataset.q); updateResult();});
  root.querySelectorAll('#evalDomains button').forEach(b=>b.onclick=()=>{domain=b.dataset.domain; root.querySelectorAll('#evalDomains button').forEach(x=>x.classList.toggle('active',x===b)); apply();});

  store.all('questions').forEach(q=>paint(q.id)); updateResult();
}


const simEsc=(v='')=>String(v).replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]||m));
const simArr=v=>Array.isArray(v)?v:[];
function sampleQuestions(questions, count=8){
  const seed=[...questions].sort((a,b)=>a.id.localeCompare(b.id));
  return seed.slice(0, Math.min(count, seed.length));
}
function domainOptions(store){return store.all('domains').map(d=>`<option value="${simEsc(d.id)}">${simEsc(d.title)}</option>`).join('');}
function examShell(questions){return questions.map((q,i)=>`<article class="sim-question" data-q="${simEsc(q.id)}">
  <div class="sim-q-head"><span class="badge">${simEsc(q.difficulty||'Pregunta')}</span><small>${simEsc(q.id)}</small></div>
  <h3>${i+1}. ${simEsc(q.question)}</h3>
  <div class="sim-options">${simArr(q.options).map((op,idx)=>`<button data-q="${simEsc(q.id)}" data-option="${idx}"><span>${String.fromCharCode(65+idx)}</span>${simEsc(op)}</button>`).join('')}</div>
  <div class="sim-feedback" id="simfb-${simEsc(q.id)}"></div>
</article>`).join('');}
function scoreBlock({answered=0,correct=0,total=0}){const score=answered?Math.round((correct/answered)*100):0;return `<div class="sim-score-card"><strong>${score}%</strong><span>${correct}/${answered||total} correctas</span><div class="progress"><span style="width:${score}%"></span></div></div>`;}
function renderSimulator({store}){
  const questions=store.all('questions');
  const initial=sampleQuestions(questions,8);
  return `<section class="simulator-center panel">
    <div class="sim-hero"><div><span class="badge">Sprint 012</span><h2>Simulador Profesional</h2><p>Entorno de práctica con preguntas originales tipo certificación. Permite trabajar en modo estudio, modo examen y repaso por dominio, conservando resultados en el navegador.</p></div><div class="sim-hero-stat"><strong>${questions.length}</strong><span>preguntas base</span></div></div>
    <div class="sim-toolbar">
      <div class="sim-mode"><button class="active" data-mode="study">Modo estudio</button><button data-mode="exam">Modo examen</button><button data-mode="domain">Por dominio</button></div>
      <div class="sim-config"><label>Dominio<select id="simDomain"><option value="all">Todos los dominios</option>${domainOptions(store)}</select></label><label>Preguntas<select id="simCount"><option>5</option><option selected>8</option><option>10</option><option>12</option></select></label><button class="primary-action" id="startSim">Iniciar intento</button></div>
    </div>
    <div class="sim-layout"><main id="simQuestions">${examShell(initial)}</main><aside class="sim-side"><div id="simScore">${scoreBlock({total:initial.length})}</div><div class="panel sim-rules"><h3>Reglas</h3><ul><li>Modo estudio muestra retroalimentación inmediata.</li><li>Modo examen retiene retroalimentación hasta finalizar.</li><li>Los resultados se agrupan por dominio y dificultad.</li></ul><button class="primary-action" id="finishSim">Finalizar intento</button></div><div class="panel sim-review" id="simReview"><h3>Recomendaciones</h3><p class="empty">Responda preguntas para obtener recomendaciones de repaso.</p></div></aside></div>
  </section>`;
}
function bindSimulator(root,{store,router}){
  let mode='study'; let selected=[]; let answers=new Map();
  const qContainer=root.querySelector('#simQuestions'); const score=root.querySelector('#simScore'); const review=root.querySelector('#simReview');
  const domainSel=root.querySelector('#simDomain'); const countSel=root.querySelector('#simCount');
  function pick(){let pool=store.all('questions'); if(domainSel.value!=='all')pool=pool.filter(q=>q.domain===domainSel.value); selected=sampleQuestions(pool,Number(countSel.value||8)); answers=new Map(); qContainer.innerHTML=examShell(selected); bindOptions(); updateScore(false); review.innerHTML='<h3>Recomendaciones</h3><p class="empty">Nuevo intento iniciado.</p>';}
  function updateScore(showReview=true){let correct=0, answered=0; selected.forEach(q=>{if(answers.has(q.id)){answered++; if(Number(answers.get(q.id))===q.answer)correct++;}}); score.innerHTML=scoreBlock({answered,correct,total:selected.length}); if(showReview)renderRecommendations();}
  function feedback(qid,force=false){const q=store.get(qid); if(!q)return; const chosen=answers.get(qid); const fb=root.querySelector(`#simfb-${qid}`); if(!fb||chosen===undefined)return; const correct=Number(chosen)===Number(q.answer); root.querySelectorAll(`[data-q="${qid}"][data-option]`).forEach(b=>{const idx=Number(b.dataset.option); b.classList.toggle('selected',idx===Number(chosen)); b.classList.toggle('correct',(mode==='study'||force)&&idx===q.answer); b.classList.toggle('incorrect',(mode==='study'||force)&&idx===Number(chosen)&&!correct);}); if(mode==='study'||force){const links=simArr(q.standards).map(id=>store.get(id)).filter(Boolean).map(x=>`<button data-open="${simEsc(x.id)}">${simEsc(x.id)}</button>`).join(''); fb.innerHTML=`<div class="${correct?'sim-ok':'sim-bad'}"><strong>${correct?'Correcto':'Incorrecto'}</strong><p>${simEsc(q.feedback||'')}</p><p><strong>Criterio:</strong> ${simEsc(q.rationale||'Revise el objeto relacionado.')}</p><div class="sim-links">${links}</div></div>`; fb.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>router.go('/item/'+b.dataset.open)); } else {fb.innerHTML='<p class="empty">Respuesta registrada. La retroalimentación se mostrará al finalizar.</p>';}}
  function renderRecommendations(){const missed=selected.filter(q=>answers.has(q.id)&&Number(answers.get(q.id))!==q.answer); const byDomain={}; missed.forEach(q=>{byDomain[q.domain]=(byDomain[q.domain]||0)+1}); const rows=Object.entries(byDomain).map(([d,n])=>{const obj=store.get(d); return `<li><strong>${simEsc(obj?.title||d)}</strong>: ${n} respuesta(s) a reforzar.</li>`;}).join(''); review.innerHTML=`<h3>Recomendaciones</h3>${missed.length?`<ul>${rows}</ul><p>Abra las normas asociadas desde cada retroalimentación y repita el intento en modo estudio.</p>`:'<p>Sin errores registrados en el intento actual.</p>'}`;}
  function bindOptions(){qContainer.querySelectorAll('[data-option]').forEach(btn=>btn.onclick=()=>{answers.set(btn.dataset.q,btn.dataset.option); feedback(btn.dataset.q); updateScore();});}
  root.querySelectorAll('.sim-mode button').forEach(b=>b.onclick=()=>{mode=b.dataset.mode; root.querySelectorAll('.sim-mode button').forEach(x=>x.classList.toggle('active',x===b)); if(mode==='domain'&&domainSel.value==='all')domainSel.value='D3'; pick();});
  root.querySelector('#startSim').onclick=pick;
  root.querySelector('#finishSim').onclick=()=>{selected.forEach(q=>feedback(q.id,true)); updateScore(true); try{const state=JSON.parse(localStorage.getItem('auditoria_nogai_simulator')||'[]'); state.push({date:new Date().toISOString(),total:selected.length,answered:answers.size}); localStorage.setItem('auditoria_nogai_simulator',JSON.stringify(state.slice(-20)));}catch(_){}};
  bindOptions(); updateScore(false);
}

class DataStore{
  constructor(data=knowledgeBase){
    this.data=data;
    this.index=new Map();
    this.collections=['domains','principles','standards','cards','cases','questions'];
    this.buildIndex();
  }
  buildIndex(){
    this.index.clear();
    this.collections.forEach(collection=>{
      (this.data[collection]||[]).forEach(item=>this.index.set(item.id,{...item,collection}));
    });
  }
  get(id){return this.index.get(id)||null;}
  all(type){return this.data[type]||[];}
  allItems(){return [...this.index.values()];}
  byDomain(domainId){return this.allItems().filter(item=>item.domain===domainId||item.id===domainId);}
  byPrinciple(principleId){return this.allItems().filter(item=>item.principle===principleId||item.id===principleId);}
  byStandard(standardId){return this.allItems().filter(item=>item.id===standardId||(item.standards||[]).includes(standardId)||(item.relations||[]).includes(standardId));}
  search(query){
    const term=(query||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
    if(!term)return[];
    const tokens=term.split(/\s+/).filter(Boolean);
    return this.allItems().map(item=>{
      const searchable=[item.id,item.title,item.summary,(item.tags||[]).join(' '),item.domain,item.principle,(item.standards||[]).join(' '),(item.relations||[]).join(' ')].join(' ').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
      const score=tokens.reduce((acc,t)=>acc+(searchable.includes(t)?1:0),0)+(searchable.includes(term)?3:0);
      return {item,score};
    }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score||a.item.title.localeCompare(b.item.title)).map(x=>x.item);
  }
}


class KnowledgeEngine{
  constructor(store){this.store=store;}
  related(id){
    const item=this.store.get(id); if(!item)return [];
    const ids=new Set([...(item.relations||[]),...(item.standards||[]),...(item.principles||[])]);
    if(item.domain)ids.add(item.domain);
    if(item.principle)ids.add(item.principle);
    if(item.standards){item.standards.forEach(s=>ids.add(s));}
    // reverse relations
    this.store.allItems().forEach(candidate=>{
      if(candidate.id===id)return;
      if((candidate.relations||[]).includes(id)||(candidate.standards||[]).includes(id)||(candidate.principles||[]).includes(id)) ids.add(candidate.id);
      if(item.type==='domain' && candidate.domain===id) ids.add(candidate.id);
      if(item.type==='principle' && candidate.principle===id) ids.add(candidate.id);
    });
    ids.delete(id);
    return [...ids].map(x=>this.store.get(x)).filter(Boolean);
  }
  children(id){
    const item=this.store.get(id); if(!item)return [];
    if(item.collection==='domains')return this.store.allItems().filter(x=>x.domain===id||x.id===id);
    if(item.collection==='principles')return this.store.allItems().filter(x=>x.principle===id||x.id===id);
    if(item.collection==='standards')return this.store.byStandard(id);
    return this.related(id);
  }
  breadcrumb(id){
    const item=this.store.get(id); if(!item)return [];
    const trail=[];
    if(item.domain)trail.push(this.store.get(item.domain));
    if(item.principle)trail.push(this.store.get(item.principle));
    trail.push(item);
    return trail.filter(Boolean);
  }
  standardsFor(item){
    if(!item)return [];
    const ids=new Set(item.collection==='standards'?[item.id]:(item.standards||[]));
    if(item.collection==='principles')(item.standards||[]).forEach(x=>ids.add(x));
    return [...ids].map(id=>this.store.get(id)).filter(Boolean);
  }
  domainCoverage(){
    return this.store.all('domains').map(domain=>({
      domain,
      principles:this.store.all('principles').filter(p=>p.domain===domain.id).length,
      standards:this.store.all('standards').filter(s=>s.domain===domain.id).length,
      cards:this.store.all('cards').filter(c=>c.domain===domain.id).length,
      cases:this.store.all('cases').filter(c=>c.domain===domain.id).length
    }));
  }
  stats(){return {domains:this.store.all('domains').length,principles:this.store.all('principles').length,standards:this.store.all('standards').length,cards:this.store.all('cards').length,cases:this.store.all('cases').length};}
}

const SYNONYMS={
  independencia:['objetividad','consejo','estatuto','mandato','posicionamiento'],
  estatuto:['mandato','autoridad','responsabilidad','consejo','deai'],
  mandato:['estatuto','consejo','autoridad','funcion de auditoria interna'],

};

class SearchEngine{
  constructor(store,knowledge){this.store=store;this.knowledge=knowledge;}
  expand(query){
    const base=normalize(query); if(!base)return [];
    const tokens=base.split(/\s+/).filter(Boolean);
    const expanded=new Set([base,...tokens]);
    Object.entries(SYNONYMS).forEach(([key,values])=>{
      if(base.includes(key)||tokens.includes(key)){values.forEach(v=>expanded.add(normalize(v)));}
      values.forEach(v=>{if(base.includes(normalize(v)))expanded.add(key);});
    });
    return [...expanded].filter(Boolean);
  }
  document(item){
    const rel=(item.relations||[]).map(id=>this.store.get(id)?.title||id).join(' ');
    const standards=(item.standards||[]).map(id=>this.store.get(id)?.title||id).join(' ');
    const domain=this.store.get(item.domain)?.title||item.domain||'';
    const principle=this.store.get(item.principle)?.title||item.principle||'';
    return normalize([
      item.id,item.title,item.summary,item.type,item.collection,domain,principle,standards,rel,(item.tags||[]).join(' '),
      (item.content?.purpose||''),(item.content?.implementation||''),(item.content?.evidence||[]).join(' ')
    ].join(' '));
  }
  score(item,queryTerms){
    const doc=this.document(item); const title=normalize(item.title); const tags=normalize((item.tags||[]).join(' ')); const id=normalize(item.id);
    let score=0; const reasons=[];
    queryTerms.forEach(term=>{
      if(!term)return;
      if(id===term){score+=100;reasons.push('Coincidencia exacta por código');}
      if(title===term){score+=90;reasons.push('Coincidencia exacta por título');}
      if(title.includes(term)){score+=35;reasons.push('Título relacionado');}
      if(tags.includes(term)){score+=22;reasons.push('Etiqueta relacionada');}
      if(doc.includes(term)){score+=8;}
    });
    if(item.collection==='standards')score+=6;
    if(item.collection==='cards')score+=5;
    if(item.collection==='principles')score+=3;
    const relationHits=(item.relations||[]).filter(id=>queryTerms.some(t=>normalize(`${id} ${this.store.get(id)?.title||''}`).includes(t))).length;
    if(relationHits){score+=relationHits*12;reasons.push('Relación del grafo de conocimiento');}
    return {score,reasons:[...new Set(reasons)].slice(0,3)};
  }
  search(query,options={}){
    const queryTerms=this.expand(query); if(!queryTerms.length)return {query,terms:[],results:[],facets:{collections:{},domains:{}}};
    const collectionFilter=options.collection||'all'; const domainFilter=options.domain||'all';
    let results=this.store.allItems().map(item=>({item,...this.score(item,queryTerms)})).filter(x=>x.score>0);
    if(collectionFilter!=='all')results=results.filter(x=>x.item.collection===collectionFilter);
    if(domainFilter!=='all')results=results.filter(x=>x.item.domain===domainFilter||x.item.id===domainFilter);
    results.sort((a,b)=>b.score-a.score||a.item.title.localeCompare(b.item.title));
    return {query,terms:queryTerms,results,facets:this.facets(results)};
  }
  facets(results){
    const collections={}; const domains={};
    results.forEach(({item})=>{
      collections[item.collection]=(collections[item.collection]||0)+1;
      const d=item.domain||item.id;
      if(d)domains[d]=(domains[d]||0)+1;
    });
    return {collections,domains};
  }
  grouped(results){
    return results.reduce((acc,result)=>{const key=result.item.collection||'otros';(acc[key]||(acc[key]=[])).push(result);return acc;},{});
  }
  label(collection){return TYPE_LABELS[collection]||collection||'Recurso';}
}


class HealthCheck{
  constructor(store,knowledge,search){
    this.store=store;
    this.knowledge=knowledge;
    this.search=search;
  }
  run(){
    const checks=[];
    const add=(id,title,ok,detail='',severity='error')=>checks.push({id,title,ok:Boolean(ok),detail,severity});
    const domains=this.store.all('domains');
    const principles=this.store.all('principles');
    const standards=this.store.all('standards');
    const cards=this.store.all('cards');
    add('D-COUNT','Dominios cargados',domains.length===5,`${domains.length}/5 dominios`);
    add('P-COUNT','Principios cargados',principles.length===15,`${principles.length}/15 principios`);
    add('S-COUNT','Normas cargadas',standards.length===52,`${standards.length}/52 normas`);
    add('IDX-UNIQUE','Índice sin duplicados',this.store.allItems().length===this.store.index.size,`${this.store.index.size} recursos indexados`);
    const orphanPrinciples=principles.filter(p=>p.domain&&!this.store.get(p.domain));
    add('REL-PRINCIPLES','Principios enlazados a dominio',orphanPrinciples.length===0,orphanPrinciples.length?`${orphanPrinciples.length} principios huérfanos`:'Sin huérfanos');
    const orphanStandards=standards.filter(s=>(s.domain&&!this.store.get(s.domain))||(s.principle&&!this.store.get(s.principle)));
    add('REL-STANDARDS','Normas enlazadas a dominio/principio',orphanStandards.length===0,orphanStandards.length?`${orphanStandards.length} normas con enlace inválido`:'Sin huérfanos');
    const orphanCards=cards.filter(c=>(c.domain&&!this.store.get(c.domain))||(c.principle&&!this.store.get(c.principle))||((c.standards||[]).some(s=>!this.store.get(s))));
    add('REL-CARDS','Knowledge Cards con relaciones válidas',orphanCards.length===0,orphanCards.length?`${orphanCards.length} cards con relación inválida`:'Relaciones válidas', 'warn');
    const mandatorySearches=['mandato','estatuto','independencia','plan anual','calidad'];
    const failedSearches=mandatorySearches.filter(q=>!this.search.search(q).results.length);
    add('SEARCH-BASIC','Búsquedas críticas responden',failedSearches.length===0,failedSearches.length?`Sin resultados: ${failedSearches.join(', ')}`:'Búsquedas críticas OK');
    const coverage=this.knowledge.domainCoverage();
    const uncovered=coverage.filter(x=>x.standards===0 && x.domain.id!=='D1');
    add('COVERAGE-DOMAINS','Cobertura por dominio consistente',uncovered.length===0,uncovered.length?`Sin normas: ${uncovered.map(x=>x.domain.id).join(', ')}`:'Cobertura consistente');
    const passed=checks.filter(x=>x.ok).length;
    const failed=checks.filter(x=>!x.ok&&x.severity==='error').length;
    const warnings=checks.filter(x=>!x.ok&&x.severity==='warn').length;
    return {generatedAt:new Date().toISOString(),summary:{total:checks.length,passed,failed,warnings,score:Math.round((passed/checks.length)*100)},checks};
  }
}


class DashboardEngine{
  constructor(store,knowledge){
    this.store=store;
    this.knowledge=knowledge;
    this.storageKey='auditoria_nogai_state_v1';
  }
  loadState(){
    try{return JSON.parse(localStorage.getItem(this.storageKey))||this.defaultState();}
    catch(_){return this.defaultState();}
  }
  saveState(patch={}){
    const next={...this.loadState(),...patch,updatedAt:new Date().toISOString()};
    localStorage.setItem(this.storageKey,JSON.stringify(next));
    return next;
  }
  defaultState(){
    return {
      lastItem:'S6.1',
      viewed:['D3','P6','S6.1','KC0001'],
      implementation:{KC0001:65,KC0002:30,KC0003:10,KC0007:0,KC0008:0},
      learning:{D1:20,D2:35,D3:55,D4:25,D5:15},
      professionalCenter:28,
      maturity:32
    };
  }
  metrics(){
    const s=this.knowledge.stats();
    return [
      {label:'Dominios',value:s.domains,caption:'estructura oficial'},
      {label:'Principios',value:s.principles,caption:'marco rector'},
      {label:'Normas',value:s.standards,caption:'base NOGAI'},
      {label:'Objetos',value:s.cards,caption:'centro profesional'}
    ];
  }
  progress(){
    const state=this.loadState();
    const learningValues=Object.values(state.learning||{});
    const learning=learningValues.length?Math.round(learningValues.reduce((a,b)=>a+b,0)/learningValues.length):0;
    const implementationValues=Object.values(state.implementation||{});
    const implementation=implementationValues.length?Math.round(implementationValues.reduce((a,b)=>a+b,0)/implementationValues.length):0;
    return [
      {label:'Aprendizaje',value:learning,caption:'dominios explorados'},
      {label:'Implementación',value:implementation,caption:'rutas iniciadas'},
      {label:'Centro Profesional',value:state.professionalCenter||0,caption:'objetos consultados'},
      {label:'Madurez',value:state.maturity||0,caption:'diagnóstico preliminar'}
    ];
  }
  recentItems(){
    const state=this.loadState();
    return (state.viewed||[]).map(id=>this.store.get(id)).filter(Boolean).slice(-6).reverse();
  }
  continueItem(){
    const state=this.loadState();
    return this.store.get(state.lastItem)||this.store.get('S6.1')||this.store.allItems()[0];
  }
  quickTools(){
    return ['KC0001','KC0002','KC0003','KC0007','KC0008','KC0010'].map(id=>this.store.get(id)).filter(Boolean);
  }
  coverageRows(){return this.knowledge.domainCoverage();}
  recommendations(){
    const item=this.continueItem();
    const related=this.knowledge.related(item.id).slice(0,5);
    return related.length?related:this.quickTools().slice(0,5);
  }
  criticalPendings(){
    const state=this.loadState();
    return Object.entries(state.implementation||{})
      .map(([id,value])=>({item:this.store.get(id),value}))
      .filter(x=>x.item&&x.value<70)
      .sort((a,b)=>a.value-b.value)
      .slice(0,5);
  }
  markViewed(id){
    const current=this.loadState();
    const viewed=[...(current.viewed||[]).filter(x=>x!==id),id].slice(-12);
    return this.saveState({lastItem:id,viewed});
  }
}

}
