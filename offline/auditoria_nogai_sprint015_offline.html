function bindKnowledgeViewer(root,{router,itemId}){

  }catch(_){}
}

class DataStore{
  constructor(data=knowledgeBase){
    this.data=data;
    this.index=new Map();
    this.collections=['domains','principles','standards','cards','cases','questions'];
    this.buildIndex();
  }
  buildIndex(){
    this.index.clear();
    this.collections.forEach(collection=>{
      (this.data[collection]||[]).forEach(item=>this.index.set(item.id,{...item,collection}));
    });
  }
  get(id){return this.index.get(id)||null;}
  all(type){return this.data[type]||[];}
  allItems(){return [...this.index.values()];}
  byDomain(domainId){return this.allItems().filter(item=>item.domain===domainId||item.id===domainId);}
  byPrinciple(principleId){return this.allItems().filter(item=>item.principle===principleId||item.id===principleId);}
  byStandard(standardId){return this.allItems().filter(item=>item.id===standardId||(item.standards||[]).includes(standardId)||(item.relations||[]).includes(standardId));}
  search(query){
    const term=(query||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
    if(!term)return[];
    const tokens=term.split(/\s+/).filter(Boolean);
    return this.allItems().map(item=>{
      const searchable=[item.id,item.title,item.summary,(item.tags||[]).join(' '),item.domain,item.principle,(item.standards||[]).join(' '),(item.relations||[]).join(' ')].join(' ').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
      const score=tokens.reduce((acc,t)=>acc+(searchable.includes(t)?1:0),0)+(searchable.includes(term)?3:0);
      return {item,score};
    }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score||a.item.title.localeCompare(b.item.title)).map(x=>x.item);
  }
}


class KnowledgeEngine{
  constructor(store){this.store=store;}
  related(id){
    const item=this.store.get(id); if(!item)return [];
    const ids=new Set([...(item.relations||[]),...(item.standards||[]),...(item.principles||[])]);
    if(item.domain)ids.add(item.domain);
    if(item.principle)ids.add(item.principle);
    if(item.standards){item.standards.forEach(s=>ids.add(s));}
    // reverse relations
    this.store.allItems().forEach(candidate=>{
      if(candidate.id===id)return;
      if((candidate.relations||[]).includes(id)||(candidate.standards||[]).includes(id)||(candidate.principles||[]).includes(id)) ids.add(candidate.id);
      if(item.type==='domain' && candidate.domain===id) ids.add(candidate.id);
      if(item.type==='principle' && candidate.principle===id) ids.add(candidate.id);
    });
    ids.delete(id);
    return [...ids].map(x=>this.store.get(x)).filter(Boolean);
  }
  children(id){
    const item=this.store.get(id); if(!item)return [];
    if(item.collection==='domains')return this.store.allItems().filter(x=>x.domain===id||x.id===id);
    if(item.collection==='principles')return this.store.allItems().filter(x=>x.principle===id||x.id===id);
    if(item.collection==='standards')return this.store.byStandard(id);
    return this.related(id);
  }
  breadcrumb(id){
    const item=this.store.get(id); if(!item)return [];
    const trail=[];
    if(item.domain)trail.push(this.store.get(item.domain));
    if(item.principle)trail.push(this.store.get(item.principle));
    trail.push(item);
    return trail.filter(Boolean);
  }
  standardsFor(item){
    if(!item)return [];
    const ids=new Set(item.collection==='standards'?[item.id]:(item.standards||[]));
    if(item.collection==='principles')(item.standards||[]).forEach(x=>ids.add(x));
    return [...ids].map(id=>this.store.get(id)).filter(Boolean);
  }
  domainCoverage(){
    return this.store.all('domains').map(domain=>({
      domain,
      principles:this.store.all('principles').filter(p=>p.domain===domain.id).length,
      standards:this.store.all('standards').filter(s=>s.domain===domain.id).length,
      cards:this.store.all('cards').filter(c=>c.domain===domain.id).length,
      cases:this.store.all('cases').filter(c=>c.domain===domain.id).length
    }));
  }
  stats(){return {domains:this.store.all('domains').length,principles:this.store.all('principles').length,standards:this.store.all('standards').length,cards:this.store.all('cards').length,cases:this.store.all('cases').length};}
}

class SearchEngine{
  constructor(store,knowledge){this.store=store;this.knowledge=knowledge;}
  expand(query){
    const base=normalize(query); if(!base)return [];
    const tokens=base.split(/\s+/).filter(Boolean);
    const expanded=new Set([base,...tokens]);
    Object.entries(SYNONYMS).forEach(([key,values])=>{
      if(base.includes(key)||tokens.includes(key)){values.forEach(v=>expanded.add(normalize(v)));}
      values.forEach(v=>{if(base.includes(normalize(v)))expanded.add(key);});
    });
    return [...expanded].filter(Boolean);
  }
  document(item){
    const rel=(item.relations||[]).map(id=>this.store.get(id)?.title||id).join(' ');
    const standards=(item.standards||[]).map(id=>this.store.get(id)?.title||id).join(' ');
    const domain=this.store.get(item.domain)?.title||item.domain||'';
    const principle=this.store.get(item.principle)?.title||item.principle||'';
    return normalize([
      item.id,item.title,item.summary,item.type,item.collection,domain,principle,standards,rel,(item.tags||[]).join(' '),
      (item.content?.purpose||''),(item.content?.implementation||''),(item.content?.evidence||[]).join(' ')
    ].join(' '));
  }
  score(item,queryTerms){
    const doc=this.document(item); const title=normalize(item.title); const tags=normalize((item.tags||[]).join(' ')); const id=normalize(item.id);
    let score=0; const reasons=[];
    queryTerms.forEach(term=>{
      if(!term)return;
      if(id===term){score+=100;reasons.push('Coincidencia exacta por cÃ³digo');}
      if(title===term){score+=90;reasons.push('Coincidencia exacta por tÃ­tulo');}
      if(title.includes(term)){score+=35;reasons.push('TÃ­tulo relacionado');}
      if(tags.includes(term)){score+=22;reasons.push('Etiqueta relacionada');}
      if(doc.includes(term)){score+=8;}
    });
    if(item.collection==='standards')score+=6;
    if(item.collection==='cards')score+=5;
    if(item.collection==='principles')score+=3;
    const relationHits=(item.relations||[]).filter(id=>queryTerms.some(t=>normalize(`${id} ${this.store.get(id)?.title||''}`).includes(t))).length;
    if(relationHits){score+=relationHits*12;reasons.push('RelaciÃ³n del grafo de conocimiento');}
    return {score,reasons:[...new Set(reasons)].slice(0,3)};
  }
  search(query,options={}){
    const queryTerms=this.expand(query); if(!queryTerms.length)return {query,terms:[],results:[],facets:{collections:{},domains:{}}};
    const collectionFilter=options.collection||'all'; const domainFilter=options.domain||'all';
    let results=this.store.allItems().map(item=>({item,...this.score(item,queryTerms)})).filter(x=>x.score>0);
    if(collectionFilter!=='all')results=results.filter(x=>x.item.collection===collectionFilter);
    if(domainFilter!=='all')results=results.filter(x=>x.item.domain===domainFilter||x.item.id===domainFilter);
    results.sort((a,b)=>b.score-a.score||a.item.title.localeCompare(b.item.title));
    return {query,terms:queryTerms,results,facets:this.facets(results)};
  }
  facets(results){
    const collections={}; const domains={};
    results.forEach(({item})=>{
      collections[item.collection]=(collections[item.collection]||0)+1;
      const d=item.domain||item.id;
      if(d)domains[d]=(domains[d]||0)+1;
    });
    return {collections,domains};
  }
  grouped(results){
    return results.reduce((acc,result)=>{const key=result.item.collection||'otros';(acc[key]||(acc[key]=[])).push(result);return acc;},{});
  }
  label(collection){return TYPE_LABELS[collection]||collection||'Recurso';}
}


class HealthCheck{
  constructor(store,knowledge,search){
    this.store=store;
    this.knowledge=knowledge;
    this.search=search;
  }
  run(){
    const checks=[];
    const add=(id,title,ok,detail='',severity='error')=>checks.push({id,title,ok:Boolean(ok),detail,severity});
    const domains=this.store.all('domains');
    const principles=this.store.all('principles');
    const standards=this.store.all('standards');
    const cards=this.store.all('cards');
    add('D-COUNT','Dominios cargados',domains.length===5,`${domains.length}/5 dominios`);
    add('P-COUNT','Principios cargados',principles.length===15,`${principles.length}/15 principios`);
    add('S-COUNT','Normas cargadas',standards.length===52,`${standards.length}/52 normas`);
    add('IDX-UNIQUE','Ãndice sin duplicados',this.store.allItems().length===this.store.index.size,`${this.store.index.size} recursos indexados`);
    const orphanPrinciples=principles.filter(p=>p.domain&&!this.store.get(p.domain));
    add('REL-PRINCIPLES','Principios enlazados a dominio',orphanPrinciples.length===0,orphanPrinciples.length?`${orphanPrinciples.length} principios huÃ©rfanos`:'Sin huÃ©rfanos');
    const orphanStandards=standards.filter(s=>(s.domain&&!this.store.get(s.domain))||(s.principle&&!this.store.get(s.principle)));
    add('REL-STANDARDS','Normas enlazadas a dominio/principio',orphanStandards.length===0,orphanStandards.length?`${orphanStandards.length} normas con enlace invÃ¡lido`:'Sin huÃ©rfanos');
    const orphanCards=cards.filter(c=>(c.domain&&!this.store.get(c.domain))||(c.principle&&!this.store.get(c.principle))||((c.standards||[]).some(s=>!this.store.get(s))));
    add('REL-CARDS','Knowledge Cards con relaciones vÃ¡lidas',orphanCards.length===0,orphanCards.length?`${orphanCards.length} cards con relaciÃ³n invÃ¡lida`:'Relaciones vÃ¡lidas', 'warn');
    const mandatorySearches=['mandato','estatuto','independencia','plan anual','calidad'];
    const failedSearches=mandatorySearches.filter(q=>!this.search.search(q).results.length);
    add('SEARCH-BASIC','BÃºsquedas crÃ­ticas responden',failedSearches.length===0,failedSearches.length?`Sin resultados: ${failedSearches.join(', ')}`:'BÃºsquedas crÃ­ticas OK');
    const coverage=this.knowledge.domainCoverage();
    const uncovered=coverage.filter(x=>x.standards===0 && x.domain.id!=='D1');
    add('COVERAGE-DOMAINS','Cobertura por dominio consistente',uncovered.length===0,uncovered.length?`Sin normas: ${uncovered.map(x=>x.domain.id).join(', ')}`:'Cobertura consistente');
    const passed=checks.filter(x=>x.ok).length;
    const failed=checks.filter(x=>!x.ok&&x.severity==='error').length;
    const warnings=checks.filter(x=>!x.ok&&x.severity==='warn').length;
    return {generatedAt:new Date().toISOString(),summary:{total:checks.length,passed,failed,warnings,score:Math.round((passed/checks.length)*100)},checks};
  }
}

class RenderEngine{
  constructor(store,knowledge,router,searchEngine=null){this.store=store;this.knowledge=knowledge;this.router=router;this.searchEngine=searchEngine;this.view=document.getElementById('view');this.context=document.getElementById('context');}
  markViewed(id){try{const k='auditoria_nogai_state_v1';const current=JSON.parse(localStorage.getItem(k))||{};const viewed=[...((current.viewed||[]).filter(x=>x!==id)),id].slice(-12);localStorage.setItem(k,JSON.stringify({...current,lastItem:id,viewed,updatedAt:new Date().toISOString()}));}catch(_){}}
  dashboard(){
    const s=this.knowledge.stats();
    const coverage=this.knowledge.domainCoverage();
    this.view.innerHTML=`<div class="hero"><h2>AuditorIA NOGAI</h2><p>Repositorio definitivo con Core Engine, Knowledge Engine y base NOGAI estructurada. Sprint 010 incorpora el Centro de Casos Profesionales conectado al Knowledge Engine.</p></div><div class="grid metrics" id="dashCards"></div><div class="panel"><div class="section-title"><h2>Cobertura por dominio</h2><span class="badge">Knowledge Base</span></div><div class="table-wrap"><table><thead><tr><th>Dominio</th><th>Principios</th><th>Normas</th><th>Objetos</th></tr></thead><tbody>${coverage.map(x=>`<tr><td>${esc(x.domain.title)}</td><td>${x.principles}</td><td>${x.standards}</td><td>${x.cards}</td></tr>`).join('')}</tbody></table></div></div>`;
    const items=[{title:'Dominios',summary:`${s.domains} dominios cargados`,type:'Indicador'},{title:'Principios',summary:`${s.principles} principios estructurados`,type:'Indicador'},{title:'Normas',summary:`${s.standards} normas NOGAI registradas`,type:'Indicador'},{title:'Objetos profesionales',summary:`${s.cards} Knowledge Cards iniciales`,type:'Indicador'},{title:'Casos',summary:`${s.cases||0} casos profesionales iniciales`,type:'Indicador'}];
    const g=document.getElementById('dashCards');items.forEach(x=>g.appendChild(card(x,()=>{})));this.contextDefault();
  }
  list(title,items){
    this.view.innerHTML=`<div class="panel"><div class="section-title"><h2>${esc(title)}</h2><span class="badge">${items.length} recursos</span></div><div class="grid" id="listGrid"></div></div>`;
    const g=document.getElementById('listGrid');items.forEach(item=>g.appendChild(card(item,()=>this.router.go('/item/'+item.id))));
  }
  item(id){
    const item=this.store.get(id); if(!item)return; this.markViewed(id);
    this.view.innerHTML=renderKnowledgeViewer({item,knowledge:this.knowledge,store:this.store});
    bindKnowledgeViewer(this.view,{router:this.router,itemId:id});
    this.contextFor(id);
  }
  searchResults(q){
    const query=(q||'').trim();
    if(!this.searchEngine){this.list(`Resultados de bÃºsqueda: ${query}`,this.store.search(query));return;}
    const payload=this.searchEngine.search(query);
    this.view.innerHTML=renderSearchView({query,payload,searchEngine:this.searchEngine,store:this.store});
    bindSearchView(this.view,{router:this.router,onSearch:(value)=>this.router.go('/buscar/'+encodeURIComponent(value||''))});
    this.context.innerHTML=`<h3>BÃºsqueda</h3><p class="empty">${payload.results.length} resultados para <strong>${esc(query)}</strong>.</p><div class="list">${payload.results.slice(0,8).map(r=>`<button data-id="${esc(r.item.id)}"><strong>${esc(r.item.title)}</strong><br><small>${esc(this.searchEngine.label(r.item.collection))} Â· ${esc(r.item.id)}</small></button>`).join('')}</div>`;
    this.context.querySelectorAll('button[data-id]').forEach(b=>b.onclick=()=>this.router.go('/item/'+b.dataset.id));
  }
  contextDefault(){this.context.innerHTML='<h3>Panel contextual</h3><p class="empty">Seleccione un recurso para ver relaciones, dependencias y navegaciÃ³n cruzada.</p>';}
  contextFor(id){
    const rel=this.knowledge.related(id);
    this.context.innerHTML=`<h3>Relaciones</h3><p class="empty">${esc(id)}</p><div class="list" id="relList"></div>`;
    const l=document.getElementById('relList');if(!rel.length)l.innerHTML='<p class="empty">Sin relaciones registradas.</p>';
    rel.slice(0,30).forEach(r=>{const b=document.createElement('button');b.innerHTML=`<strong>${esc(r.title)}</strong><br><small>${esc(r.type||r.collection)} Â· ${esc(r.id)}</small>`;b.onclick=()=>this.router.go('/item/'+r.id);l.appendChild(b);});
  }
}



esc=(v='')=>String(v).replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]));

const dashboardModule=(renderer,store,knowledge,router)=>{
  const engine=new DashboardEngine(store,knowledge);
  const current=engine.continueItem();
  const metrics=engine.metrics().map(metricCard).join('');
  const progress=engine.progress().map(progressWidget).join('');
  const tools=engine.quickTools().map(x=>resourceButton(x)).join('');
  const recent=engine.recentItems().map(x=>resourceButton(x,'Continuar')).join('')||'<p class="empty">Sin actividad registrada.</p>';
  const recommendations=engine.recommendations().map(x=>resourceButton(x,'Revisar')).join('');
  const pendings=engine.criticalPendings().map(x=>`<button class="resource-btn" data-id="${esc(x.item.id)}"><strong>${esc(x.item.title)}</strong><small>Avance ${x.value}%</small>${progressBar(x.value)}</button>`).join('')||'<p class="empty">Sin pendientes crÃ­ticos.</p>';
  const coverage=engine.coverageRows().map(x=>`<tr><td>${esc(x.domain.title)}</td><td>${x.principles}</td><td>${x.standards}</td><td>${x.cards}</td></tr>`).join('');

  renderer.view.innerHTML=`
    <div class="dashboard-hero">
      <div>
        <span class="badge">Sprint 003 Â· Dashboard Profesional</span>
        <h2>Centro de operaciones AuditorIA NOGAI</h2>
        <p>Panel ejecutivo conectado al Core Engine, DataStore y Knowledge Engine. Desde aquÃ­ se accede al aprendizaje, implementaciÃ³n, centro profesional y relaciones crÃ­ticas de las NOGAI.</p>
      </div>
      <button class="primary-action" data-id="${esc(current.id)}">Continuar: ${esc(current.id)}</button>
    </div>
    <div class="dash-metrics">${metrics}</div>
    <div class="dashboard-grid">
      ${widget('Continuar aprendizaje',`<p class="lead-sm">Ãltimo recurso activo</p>${resourceButton(current,'Continuar')}`,'Core')}
      ${widget('Mi progreso',progress,'Local')}
      ${widget('Implementaciones pendientes',pendings,'Implementador')}
      ${widget('Centro Profesional',tools,'Accesos rÃ¡pidos')}
      ${widget('Actividad reciente',recent,'Historial')}
      ${widget('Recomendaciones',recommendations,'Knowledge Graph')}
    </div>
    <section class="panel dashboard-coverage">
      <div class="section-title"><h2>Cobertura de la Base NOGAI</h2><span class="badge">DataStore</span></div>
      <div class="table-wrap"><table><thead><tr><th>Dominio</th><th>Principios</th><th>Normas</th><th>Objetos</th></tr></thead><tbody>${coverage}</tbody></table></div>
    </section>`;
  renderer.view.querySelectorAll('[data-id]').forEach(btn=>btn.onclick=()=>{engine.markViewed(btn.dataset.id);router.go('/item/'+btn.dataset.id);});
  renderer.context.innerHTML=`<h3>Panel contextual</h3><p class="empty">Dashboard conectado al Knowledge Engine.</p><div class="list">${recommendations}</div>`;
  renderer.context.querySelectorAll('[data-id]').forEach(btn=>btn.onclick=()=>{engine.markViewed(btn.dataset.id);router.go('/item/'+btn.dataset.id);});
};
